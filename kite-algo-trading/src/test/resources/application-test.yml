spring:
  datasource:
    url: jdbc:h2:mem:kitealgo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

broker:
  mode: PAPER

telegram:
  enabled: false

news:
  enabled: false

admin:
  api-key: test-admin-key

logging:
  level:
    com.kite.trading: WARN
